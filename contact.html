<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - David Kithi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav>
    <div class="nav-container">
      <div class="logo">David Kithi</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="menu-toggle" id="menuToggle">☰</button>
    </div>
  </nav>

  <section class="contact">
    <h2>Contact Me</h2>
    <p style="font-size:1.2rem;margin:1.5rem 0;">Feel free to reach out for collaborations or opportunities.</p>

    <!-- SUCCESS MESSAGE (hidden by default) -->
    <div id="successMsg" style="display:none; background:#d1fae5; color:#065f46; border:1px solid #6ee7b7;
         padding:1rem 1.5rem; border-radius:10px; max-width:500px; margin:0 auto 1.5rem; text-align:center; font-weight:500;">
      Message sent! I'll get back to you soon.
    </div>

    <div class="contact-form">
      <!-- ACTION: replace with your Formspree URL e.g. https://formspree.io/f/meenrpvn -->
      <form id="contactForm" action="https://formspree.io/f/meenrpvn" method="POST">

        <!-- Hidden: redirect back to this page after submit -->
        <input type="hidden" name="_subject" value="New message from portfolio contact form" />

        <input
          type="text"
          name="name"
          placeholder="Your name"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="Your email"
          required
        />
        <textarea
          name="message"
          placeholder="Write your message here"
          rows="5"
          required
        ></textarea>

        <button type="submit" id="submitBtn">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 David Kithi. Built with ❤️ and pure CSS</p>
  </footer>

  <script>
    // Nav toggle
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('active');
    });

    // Form submission with loading state + success message
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      // Show loading state
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          // Success
          form.reset();
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          // Formspree returned an error
          btn.textContent = 'Failed to send. Try again.';
          btn.disabled = false;
        }
      } catch (err) {
        // Network error
        btn.textContent = 'Network error. Try again.';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
