<!DOCTYPE html >
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - David Kithi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="contact">
    <h2>Contact Me</h2>
    <p style="font-size:1.2rem;margin:1.5rem 0;">Feel free to reach out for collaborations or opportunities.</p>

    <div class="contact-form">
      <input type="text" placeholder="your name">
      <input type="email" placeholder="your email">
      <textarea placeholder="write your message here" rows="5"></textarea>
      <button type="button">Send Message</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 David Kithi. Built with ❤️ and pure CSS</p>
  </footer>

  <script>
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('active');
    });
  </script>
</body>
</html>
